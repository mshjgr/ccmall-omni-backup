<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CCMall Admin - 고객 관리</title>
    <style>
        /* 메인 페이지 스타일 상속 */
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0f8ff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(70, 130, 180, 0.15); width: 90%; max-width: 1000px; border: 2px solid #b0e0e6; }
        
        /* 상단 헤더 영역 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #4682b4; margin: 0; }

        /* 와이어프레임: 검색 영역 */
        .search-area { display: flex; gap: 10px; margin-bottom: 20px; background: #e0ffff; padding: 15px; border-radius: 15px; }
        select, input { padding: 10px; border: 2px solid #b0e0e6; border-radius: 10px; outline: none; }
        .btn-search { background: #87ceeb; color: white; border: none; border-radius: 10px; padding: 0 20px; cursor: pointer; font-weight: bold; }
        .btn-search:hover { background: #4682b4; }

        /* 고객 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #87ceeb; color: white; padding: 12px; border-radius: 5px 5px 0 0; }
        td { padding: 15px; border-bottom: 1px solid #f0f8ff; text-align: center; color: #555; }
        tr:hover { background: #f9ffff; }

        /* 상세보기 버튼 */
        .btn-detail { background: white; color: #4682b4; border: 2px solid #87ceeb; border-radius: 8px; padding: 5px 15px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .btn-detail:hover { background: #87ceeb; color: white; }

        /* 뒤로가기 버튼 */
        .btn-back { margin-top: 20px; background: none; border: none; color: #888; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h2>☁️ 고객 관리 리스트</h2>
            <button class="btn-detail" onclick="location.href='/'">메인으로</button>
        </div>

        <div class="search-area">
            <select id="search-type">
                <option value="id">아이디</option>
                <option value="name">이름</option>
                <option value="addr">주소</option>
            </select>
            <input type="text" id="search-input" placeholder="검색어를 입력하세요..." style="flex-grow: 1;">
            <button class="btn-search">검색</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>아이디</th>
                    <th>이름</th>
                    <th>주소</th>
                    <th>액션</th>
                </tr>
            </thead>
            <tbody>
                {% for customer in customers %}
                <tr>
                    <td><strong>{{ customer.id }}</strong></td>
                    <td>{{ customer.name }}</td>
                    <td>{{ customer.addr }}</td>
                    <td>
                        <button class="btn-detail" onclick="location.href='/customers/{{ customer.id }}'">상세보기</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <button class="btn-back" onclick="history.back()">이전 페이지로</button>

</body>
</html>
