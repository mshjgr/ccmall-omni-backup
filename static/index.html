<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CCMall Admin</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0f8ff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(70, 130, 180, 0.15); text-align: center; width: 350px; border: 2px solid #b0e0e6; }
        
        .cute-cloud-container { position: relative; display: inline-block; width: 120px; height: 100px; margin-bottom: 20px; animation: float 3s infinite ease-in-out; cursor: pointer; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .cloud-body { position: absolute; bottom: 0; left: 10px; width: 100px; height: 40px; background: #fff; border-radius: 50px; border: 4px solid #87ceeb; }
        .cloud-body::after, .cloud-body::before { content: ''; position: absolute; background: #fff; border-radius: 50%; border: 4px solid #87ceeb; }
        .cloud-body::after { width: 50px; height: 50px; top: -30px; left: 15px; border-bottom: none; }
        .cloud-body::before { width: 40px; height: 40px; top: -20px; right: 15px; border-bottom: none; }

        .cute-face { position: absolute; top: 10px; left: 25px; display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 10; }
        .cute-eyes { display: flex; gap: 15px; font-size: 16px; font-weight: bold; color: #4682b4; } 
        .cute-mouth { font-size: 12px; color: #ff69b4; } 

        input { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #b0e0e6; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #87ceeb; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #4682b4; }

        .menu-grid { display: grid; gap: 15px; margin-top: 20px; }
        .menu-btn { padding: 20px; background: white; color: #4682b4; border: 3px solid #87ceeb; border-radius: 15px; font-size: 18px; font-weight: bold; text-decoration: none; transition: all 0.2s; display: block; }
        .menu-btn:hover { background: #e0ffff; transform: scale(1.05); }
    </style>
</head>
<body>

    {% if is_login %}
    <!-- [로그인 성공 시] 관리 메인 화면 -->
    <div id="menu-box" class="card">
        <div class="cute-cloud-container" onclick="location.href='/'">
            <div class="cloud-body">
                <div class="cute-face">
                    <div class="cute-eyes">● &nbsp; ●</div> <div class="cute-mouth">v</div> 
                </div>
            </div>
        </div>
        <h2 style="color: #4682b4; margin-top: 0;">관리 메인</h2>
        <div class="menu-grid">
            <a href="/customers/" class="menu-btn">고객관리</a>
            <a href="/orders/" class="menu-btn">주문관리</a>
            <a href="/inventorys/" class="menu-btn">재고관리</a>
        </div>
        <a href="/logout" style="margin-top: 20px; display: block; color: #888; text-decoration: none; font-size: 12px;">로그아웃</a>
    </div>

   {% else %}
    <!-- [로그인 전] 로그인 화면 -->
    <div id="login-box" class="card">
        <div class="cute-cloud-container">
            <div class="cloud-body">
                <div class="cute-face">
                    <div class="cute-eyes">● &nbsp; ●</div> <div class="cute-mouth">v</div> 
                </div>
            </div>
        </div>
        <h2 style="color: #4682b4; margin-top: 0;">CCMall Admin</h2>

        <!-- [수정] 에러 메시지가 서버에서 넘어온 경우에만 이 박스를 보여줌 -->
        {% if error_msg %}
        <div style="background: #fff0f0; color: #ff4d4d; border: 1px solid #ffcccc; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; font-weight: bold;">
            ⚠️ {{ error_msg }}
        </div>
        {% endif %}

        <form action="/login" method="post">
            <input type="text" name="username" placeholder="아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
    {% endif %}
        

</body>
</html>
