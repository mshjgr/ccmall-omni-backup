<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CCMall Admin - 재고 관리</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f0f8ff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(70, 130, 180, 0.15); width: 90%; max-width: 1000px; border: 2px solid #b0e0e6; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #4682b4; margin: 0; }
        
        /* 와이어프레임 검색 영역 */
        .search-area { display: flex; gap: 10px; margin-bottom: 20px; background: #e0ffff; padding: 15px; border-radius: 15px; }
        input { padding: 10px; border: 2px solid #b0e0e6; border-radius: 10px; outline: none; flex-grow: 1; }
        .btn-search { background: #87ceeb; color: white; border: none; border-radius: 10px; padding: 0 25px; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #87ceeb; color: white; padding: 12px; }
        td { padding: 15px; border-bottom: 1px solid #f0f8ff; text-align: center; }
        .btn-detail { background: white; color: #4682b4; border: 2px solid #87ceeb; border-radius: 8px; padding: 5px 15px; cursor: pointer; font-weight: bold; }
        .btn-detail:hover { background: #87ceeb; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2>📦 재고 관리 시스템</h2>
            <button class="btn-detail" onclick="location.href='/'">메인으로</button>
        </div>

        <form action="/inventorys/" method="get" class="search-area">
            <input type="text" name="search_input" placeholder="상품명을 입력하세요..." value="{{ request.query_params.get('search_input', '') }}">
            <button type="submit" class="btn-search">검색</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>상품 ID</th>
                    <th>상품명</th>
                    <th>재고 수량</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.item_id }}</td>
                    <td><strong>{{ item.item_name }}</strong></td>
                    <td>{{ item.quantity }} 개</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
