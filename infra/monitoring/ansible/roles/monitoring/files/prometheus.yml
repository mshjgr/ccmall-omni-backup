global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"      # 알림 규칙 파일 연결!

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

scrape_configs:
  - job_name: 'mgmt'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'web'
    static_configs:
      - targets: ['10.0.1.10:9100']

  - job_name: 'recovery'
    static_configs:
      - targets: ['10.0.2.30:9100']

  - job_name: 'onprem-db'
    static_configs:
      - targets: ['10.0.2.20:9100']