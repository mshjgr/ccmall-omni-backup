global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'telegram'

receivers:
  - name: 'telegram'
    telegram_configs:
      - bot_token: "{{ telegram_bot_token }}"
        chat_id: {{ telegram_chat_id }}
        message: |
          🚨 *[CCmall] {{ '{{' }} .GroupLabels.alertname {{ '}}' }}*
          상태: {{ '{{' }} .Status {{ '}}' }}
          {{ '{{' }} range .Alerts {{ '}}' }}
          📌 {{ '{{' }} .Annotations.summary {{ '}}' }}
          {{ '{{' }} .Annotations.description {{ '}}' }}
          {{ '{{' }} end {{ '}}' }}
        parse_mode: 'Markdown'
