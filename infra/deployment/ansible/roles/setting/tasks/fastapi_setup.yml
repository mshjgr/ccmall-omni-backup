# deployment/ansible/roles/setting/tasks/fastapi_setup.yml

---
- name: (ccmall_web) FastAPI 앱 배포 및 실행
  block:
    - name: (ccmall_web) 필수 패키지 설치
      dnf:
        name:
          - git
          - python3
          - python3-pip
        state: present

    - name: (ccmall_web) 앱 디렉터리 준비
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: (ccmall_web) GitHub에서 프로젝트 clone 또는 update
      git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}"
        version: "{{ app_branch }}"
        force: yes
      become_user: "{{ app_user }}"

    - name: (ccmall_web) 가상환경 생성
      command:
        cmd: python3 -m venv {{ app_dir }}/venv
        creates: "{{ app_dir }}/venv/bin/activate"

    - name: (ccmall_web) requirements 설치
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"

    - name: (ccmall_web) systemd 서비스 파일 배포
      template:
        src: ccmall.service.j2
        dest: /etc/systemd/system/{{ app_name }}.service
        mode: "0644"

    - name: (ccmall_web) systemd daemon reload
      systemd:
        daemon_reload: true

    - name: (ccmall_web) FastAPI 서비스 실행 및 자동 시작
      systemd:
        name: "{{ app_name }}"
        enabled: true
        state: restarted

  when: inventory_hostname == 'ccmall-Web'