#deployment/ansible/roles/setting/tasks/server_setup.yml
---
# ---------------------
# 공통 패키지 설치
# ---------------------
- name: 공통 패키지 설치
  dnf:
    name:
      - vim
      - git
      - wget
      - net-tools
      - unzip
      - firewalld
      - python3
      - python3-pip
      - python3-devel
      - gcc
    state: present
# local ok, ec2에선 curl 설치 x

- name: firewalld 시작
  service:
    name: firewalld
    state: started
    enabled: yes
  ignore_errors: yes

# ---------------------
# ccmall_con set up
# ---------------------
- name: ccmall_con 필요 패키지 설치
  block:
    - name: (ccmall_con) 기본 관리 패키지 설치
      dnf:
        name:
          - curl
          - awscli
          - openssh-clients
          - unzip
          - python3-pip
        state: present

    - name: (ccmall_con) Terraform 아키텍처 변수 설정
      set_fact:
        tf_arch: >-
          {{ 'amd64' if ansible_architecture == 'x86_64'
          else 'arm64' }}

    - name: (ccmall_con) Terraform 1.5.7 다운로드
      get_url:
        url: "https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_{{ tf_arch }}.zip"
        dest: /tmp/terraform.zip
        mode: '0644'

    - name: (ccmall_con) Terraform 압축 해제
      unarchive:
        src: /tmp/terraform.zip
        dest: /usr/local/bin
        remote_src: yes
        creates: /usr/local/bin/terraform

    - name: (ccmall_con) Terraform 실행 권한 부여
      file:
        path: /usr/local/bin/terraform
        mode: '0755'

    - name: (ccmall_con) Ansible 2.15.0 설치
      pip:
        name: ansible-core==2.15.0
        executable: pip3
  when: inventory_hostname == 'ccmall-Con'

# ---------------------
# ccmall_web set up
# ---------------------
- name: ccmall_web 필요 패키지 설치
  block:
    - name: (ccmall_web) nginx 설치
      dnf:
        name: nginx
        state: present

    - name: (ccmall_web) nginx 실행
      service:
        name: nginx
        state: started
        enabled: yes
    
    - name: (ccmall_web) web 디렉토리 생성
      file:
        path: /opt/ccmall-web
        state: directory
        mode: '0755'

    - name: (ccmall_web) web venv 생성
      command: python3 -m venv /opt/ccmall-web/venv
      args:
        creates: /opt/ccmall-web/venv/bin/activate

    - name: (ccmall_web) web pip 설치
      pip:
        virtualenv: /opt/ccmall-web/venv
        name:
          - fastapi==0.109.0
          - jinja2==3.1.3
          - uvicorn==0.27.0
          - sqlalchemy==2.0.25
          - psycopg2-binary==2.9.9
          - python-dotenv==1.0.0
          - passlib==1.7.4
          - python-multipart==0.0.6
  when: inventory_hostname == 'ccmall-Web'

# ---------------------
# ccmall_rec setup
# ---------------------
- name: ccmall_rec 필요 패키지 설치
  block:
    - name: (ccmall_rec) awscli 설치
      dnf:
        name: awscli
        state: present

    - name: (ccmall_rec) backup 디렉토리 생성
      file:
        path: /opt/backup
        state: directory
        mode: '0755'
    
    - name: (ccmall_rec) rec venv 생성
      command: python3 -m venv /opt/backup/venv
      args:
        creates: /opt/backup/venv/bin/activate
    
    - name: (ccmall_rec) rec pip 설치
      pip:
        virtualenv: /opt/backup/venv
        name:
          - apscheduler==3.10.4
          - boto3==1.34.0
          - python-dotenv==1.0.0
  when: inventory_hostname == 'ccmall-Rec'

  