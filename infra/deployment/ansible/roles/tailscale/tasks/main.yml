# deployment/ansible/roles/setting/tasks/vpn_setup.yml
# tailscale로 VPN 라우팅 구성 노드

# 5/13 오전수업 진도 후 추가 수정 예정

# EC2 쪽 private subnet에 위치한 ccmall-Rec이 대장노드.
# onprem 쪽 ansible 배포 서버 ccmall-con or (mgmt)가 대장 노드.

# deployment/ansible/roles/setting/tasks/vpn_setup.yml
# tailscale로 VPN 라우팅 구성 코드

- name: (VPN) TailScale 설치
  ansible.builtin.shell:
    cmd: "curl -fsSL https://tailscale.com/install.sh | sh"
    creates: /usr/bin/tailscale
  args:
    executable: /bin/bash

- name: (VPN) Tailscale 서비스 시작
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: yes

- name: (VPN) IP 포워딩 활성화
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    reload: yes
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding

- name: (VPN) 서버 별 advertise route 결정
  ansible.builtin.set_fact:
    tailscale_advertise_routes: >-
      {% if inventory_hostname == 'ccmall-Rec' %}
      {{ ec2_cidr }}
      {% elif inventory_hostname == 'ccmall-Con' %}
      {{ local_cidr }}
      {% else %}
      {{ '' }}
      {% endif %}

- name: (VPN) Tailscale 로그인 및 경로 광고 시작
  ansible.builtin.command:
    cmd: >
      tailscale up
      --reset
      --hostname={{ inventory_hostname }}
      --authkey={{ tailscale_auth_key }}

      {% if inventory_hostname == 'ccmall-Rec' %}
      --accept-routes
      {% endif %}

      {% if tailscale_advertise_routes | trim != '' %}
      --advertise-routes={{ tailscale_advertise_routes | trim }}
      {% endif %}
  register: tailscale_up_result
  changed_when: tailscale_up_result.rc == 0
  no_log: true

- name: (VPN) Tailscale 기기 목록 조회
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/tailnet/{{ tailnet_name }}/devices"
    method: GET
    user: "{{ tailscale_api_key }}"
    password: ""
    force_basic_auth: yes
  register: tailscale_devices
  delegate_to: localhost
  run_once: true
  retries: 6
  delay: 20
  until: tailscale_devices.status == 200
  no_log: true

- name: (VPN) 현재 호스트 device ID 추출
  ansible.builtin.set_fact:
    target_device_id: "{{ tailscale_devices.json.devices | json_query(query) }}"
  vars:
    query: "[?hostname=='{{ inventory_hostname }}'].id | [0]"

- name: (VPN) advertise route 승인 API 전송
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/device/{{ target_device_id }}/routes"
    method: POST
    user: "{{ tailscale_api_key }}"
    password: ""
    force_basic_auth: yes
    body_format: json
    body:
      routes:
        - "{{ tailscale_advertise_routes | trim }}"
    status_code:
      - 200
      - 201
  when:
    - target_device_id is defined
    - target_device_id | length > 0
    - tailscale_advertise_routes | trim != ''
  delegate_to: localhost
  no_log: true

- name: (VPN) Tailscale 상태 확인
  ansible.builtin.command:
    cmd: tailscale status
  register: tailscale_status
  changed_when: false

- name: (VPN) 결과 출력
  ansible.builtin.debug:
    msg:
      - "HOST: {{ inventory_hostname }}"
      - "Ad route: {{ tailscale_advertise_routes | trim | default('없음') }}"
      - "Tailscale 상태:"
      - "{{ tailscale_status.stdout_lines }}"